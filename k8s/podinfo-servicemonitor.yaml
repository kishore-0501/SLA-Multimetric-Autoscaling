apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: podinfo-monitor
  namespace: monitoring
  labels:
    release: prometheus   
spec:
  namespaceSelector:
    matchNames:
      - sla-demo

  selector:
    matchLabels:
      app.kubernetes.io/name: podinfo

  endpoints:
    - port: http
      path: /metrics
      interval: 10s